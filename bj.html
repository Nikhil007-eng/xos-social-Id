<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent; /* REMOVE BLUE TOUCH HIGHLIGHT */
        }

        body {
            background: #000;
            color: #fff;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .badge {
            color: #666;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 36px;
            font-weight: 600;
            letter-spacing: -1px;
            margin-top: 5px;
        }

        .notif-icon {
            width: 48px;
            height: 48px;
            background: #111;
            border: 1px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .notif-icon:hover {
            border-color: #666;
            transform: scale(1.05);
        }

        .notif-icon svg {
            width: 24px;
            height: 24px;
            stroke: #888;
        }

        .song-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 800px;
            width: 100%;
            padding: 0 4px;
        }

        .song-card {
            cursor: pointer;
            transition: 0.3s;
        }

        .song-card:hover {
            transform: translateY(-5px);
        }

        /* Square thumbnail container */
        .thumb-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #050505;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
        }

        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Fills the square cleanly, cropping if needed */
            display: block;
        }

        .song-info h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-info p {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #notif-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .notif-window {
            background: #111;
            border: 1px solid #333;
            border-radius: 30px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        .notif-back {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }

        .notif-back:hover {
            color: #fff;
            border-color: #666;
        }

        .notif-content {
            margin-top: 30px;
        }

        .notif-content p {
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .dev-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            color: #000;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
        }

        #player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .player-window {
            background: #111;
            border: 1px solid #333;
            border-radius: 40px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        .player-back {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            z-index: 10;
        }

        .player-back:hover {
            color: #fff;
        }

        .yt-hidden {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 50px;
            position: relative;
            background: #000;
        }

        .album-art {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #yt-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0;
        }

        .track-title {
            font-size: 24px;
            font-weight: 600;
            margin: 20px 0 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .seek-row {
            margin: 20px 0;
        }

        .seek-wrap {
            width: 100%;
            height: 4px;
            background: #222;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .seek-fill {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .seek-times {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            color: #444;
            font-size: 12px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .ctrl-btn:hover {
            color: #fff;
            background: #1a1a1a;
        }

        .ctrl-btn.play-pause {
            width: 70px;
            height: 70px;
            background: #fff;
            color: #000;
        }

        .ctrl-btn.play-pause:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .audio-badge {
            text-align: center;
            margin-top: 15px;
            padding: 8px;
            color: #0ff;
            font-size: 12px;
            letter-spacing: 1px;
            border-top: 1px solid #222;
            opacity: 0.7;
        }

        .audio-badge span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #0ff;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px #0ff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* FLOATING MINI PLAYER STYLES */
        #mini-player {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #111;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 10px 15px;
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .mini-thumb {
            width: 40px;
            height: 40px;
            aspect-ratio: 1 / 1;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .mini-info {
            flex: 1;
            min-width: 0;
        }

        .mini-info h4 {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mini-controls {
            display: flex;
            gap: 10px;
        }

        .mini-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 5px;
        }

    </style>
</head>
<body>

<header>
    <div>
        <div class="badge">x0 audio Lab</div>
        <h1>My favourite songs</h1>
    </div>
    <div class="notif-icon" onclick="openNotification()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v5M12 16h.01" stroke-linecap="round"/>
        </svg>
    </div>
</header>

<div class="song-grid" id="song-grid"></div>

<div id="mini-player" onclick="maximizePlayer()">
    <img src="" class="mini-thumb" id="mini-thumb">
    <div class="mini-info">
        <h4 id="mini-title">Track Name</h4>
    </div>
    <div class="mini-controls" onclick="event.stopPropagation()">
        <button class="mini-btn" onclick="togglePlayPause()">
            <svg id="m-play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="m-pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="mini-btn" onclick="nextTrack()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm8.5-12v12h2V6h-2zM16 6h2v12h-2z"/></svg>
        </button>
    </div>
</div>

<div id="notif-overlay" onclick="if(event.target===this) closeNotification()">
    <div class="notif-window">
        <button class="notif-back" onclick="closeNotification()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor">
                <path d="M9 2L4 7l5 5" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            Back
        </button>
        <div class="notif-content">
            <p>Experience music with enhanced quality, my tool uses yt in background and alter the frequency of sound to get a better output.</p>
            <a href="https://nikhil007-eng.github.io/xos-social-Id/" class="dev-link" target="_blank">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
                developer
            </a>
        </div>
    </div>
</div>

<div id="player-overlay" onclick="if(event.target===this) closePlayer()">
    <div class="player-window" id="player-window">
        <button class="player-back" onclick="closePlayer()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor">
                <path d="M9 2L4 7l5 5" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            Back
        </button>

        <div class="yt-hidden">
            <img class="album-art" id="album-art" src="">
            <div id="yt-player"></div>
        </div>

        <h2 class="track-title" id="track-title">Track Name</h2>
        <p class="track-artist" id="track-artist">Artist</p>

        <div class="seek-row">
            <div class="seek-wrap" onclick="seekTo(event)">
                <div class="seek-fill" id="seek-fill"></div>
            </div>
            <div class="seek-times">
                <span id="time-current">0:00</span>
                <span id="time-duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" onclick="previousTrack()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
                </svg>
            </button>
            <button class="ctrl-btn play-pause" onclick="togglePlayPause()">
                <svg id="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg id="pause-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
            <button class="ctrl-btn" onclick="nextTrack()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 18l8.5-6L6 6v12zm8.5-12v12h2V6h-2zM16 6h2v12h-2z"/>
                </svg>
            </button>
        </div>

        <div class="audio-badge">
            <span></span> Enhanced Audio
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const songUrls = [
        'https://youtu.be/3xbWRl-D53Q',   // Song 1
        'https://youtu.be/RT1voph97P8',   // Song 2
        'https://music.youtube.com/watch?v=en8fjTxRyqI',   // Song 3
        'https://music.youtube.com/watch?v=XqeEeTe0ROI',   // Song 4
        'https://music.youtube.com/watch?v=X8bu-nEmN5o',   // Song 5
    ];

    function extractVideoId(url) {
        const patterns = [
            /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
            /^([a-zA-Z0-9_-]{11})$/
        ];
        for (let pattern of patterns) {
            const match = url.match(pattern);
            if (match) return match[1];
        }
        return null;
    }

    const songs = songUrls.map(url => extractVideoId(url)).filter(id => id);

    let player;
    let currentVideoId = '';
    let isPlaying = false;
    let seekInterval;
    let audioContext;
    let audioSource;
    let eqFilters = [];
    
    // Professional audio chain config
    const eqBands = [
        { freq: 32,    type: 'lowshelf',  gain: 3.5,  Q: 0.7  },
        { freq: 64,    type: 'peaking',   gain: 3.0,  Q: 1.0  },
        { freq: 125,   type: 'peaking',   gain: 1.5,  Q: 1.2  },
        { freq: 250,   type: 'peaking',   gain: -1.0, Q: 1.4  },
        { freq: 500,   type: 'peaking',   gain: -0.5, Q: 1.2  },
        { freq: 1000,  type: 'peaking',   gain: 1.0,  Q: 1.0  },
        { freq: 2500,  type: 'peaking',   gain: 2.0,  Q: 1.4  },
        { freq: 5000,  type: 'peaking',   gain: 3.0,  Q: 1.2  },
        { freq: 8000,  type: 'peaking',   gain: 3.5,  Q: 1.0  },
        { freq: 12000, type: 'peaking',   gain: 2.5,  Q: 0.9  },
        { freq: 16000, type: 'highshelf', gain: 4.0,  Q: 0.7  },
    ];
    let compressor, gainNode, limiterNode;

    function renderSongGrid() {
        const grid = document.getElementById('song-grid');
        grid.innerHTML = '';
        songs.forEach(videoId => {
            if (!videoId) return;
            const card = document.createElement('div');
            card.className = 'song-card';
            card.onclick = () => openPlayer(videoId);
            const thumbBox = document.createElement('div');
            thumbBox.className = 'thumb-box';
            const img = document.createElement('img');
            img.src = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
            img.onerror = function() {
                this.onerror = function() { this.src = `https://img.youtube.com/vi/${videoId}/default.jpg`; };
                this.src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
            };
            thumbBox.appendChild(img);
            const info = document.createElement('div');
            info.className = 'song-info';
            const titleEl = document.createElement('h3');
            titleEl.id = `title-${videoId}`;
            titleEl.textContent = 'Loading...';
            const artistEl = document.createElement('p');
            artistEl.id = `artist-${videoId}`;
            artistEl.textContent = '';
            info.appendChild(titleEl);
            info.appendChild(artistEl);
            card.appendChild(thumbBox);
            card.appendChild(info);
            grid.appendChild(card);
            fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById(`title-${videoId}`).textContent = data.title || 'Unknown Title';
                    const rawArtist = data.author_name || 'YouTube';
                    document.getElementById(`artist-${videoId}`).textContent = rawArtist.replace(/\s*-\s*Topic$/i, '');
                })
                .catch(() => {});
        });
    }

    document.addEventListener('DOMContentLoaded', renderSongGrid);

    window.onYouTubeIframeAPIReady = () => {
        player = new YT.Player('yt-player', {
            height: '100%',
            width: '100%',
            playerVars: {
                controls: 0,
                modestbranding: 1,
                rel: 0,
                iv_load_policy: 3
            },
            events: {
                onStateChange: onPlayerStateChange
            }
        });
    };

    function onPlayerStateChange(event) {
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const mPlay = document.getElementById('m-play-icon');
        const mPause = document.getElementById('m-pause-icon');

        if (event.data === YT.PlayerState.PLAYING) {
            isPlaying = true;
            playIcon.style.display = mPlay.style.display = 'none';
            pauseIcon.style.display = mPause.style.display = 'block';
            startSeekTimer();
            connectEQ();
        } else if (event.data === YT.PlayerState.PAUSED) {
            isPlaying = false;
            playIcon.style.display = mPlay.style.display = 'block';
            pauseIcon.style.display = mPause.style.display = 'none';
            stopSeekTimer();
        } else if (event.data === YT.PlayerState.ENDED) {
            nextTrack();
        }
    }

    function openPlayer(videoId) {
        currentVideoId = videoId;
        document.getElementById('player-overlay').style.display = 'flex';
        document.getElementById('mini-player').style.display = 'none';
        document.body.style.overflow = 'hidden';
        document.getElementById('track-title').textContent = 'Loading...';
        document.getElementById('track-artist').textContent = 'Please wait';
        document.getElementById('album-art').src = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
        document.getElementById('mini-thumb').src = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
        
        if (window.location.hash !== '#playing') {
            history.pushState({player: true}, '', '#playing');
        }
        
        if (player && player.loadVideoById) {
            player.loadVideoById(videoId);
        }

        fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`)
            .then(r => r.json())
            .then(data => {
                document.getElementById('track-title').textContent = document.getElementById('mini-title').textContent = data.title || 'Unknown';
                document.getElementById('track-artist').textContent = (data.author_name || '').replace(/\s*-\s*Topic$/i, '');
            });
    }

    function closePlayer() {
        document.getElementById('player-overlay').style.display = 'none';
        document.body.style.overflow = '';
        if (currentVideoId) {
            document.getElementById('mini-player').style.display = 'flex';
        }
        if (window.location.hash === '#playing') history.back();
    }

    function maximizePlayer() {
        document.getElementById('player-overlay').style.display = 'flex';
        document.getElementById('mini-player').style.display = 'none';
        document.body.style.overflow = 'hidden';
        history.pushState({player: true}, '', '#playing');
    }

    function togglePlayPause() {
        if (!player) return;
        if (isPlaying) player.pauseVideo();
        else player.playVideo();
    }

    function nextTrack() {
        const currentIndex = songs.indexOf(currentVideoId);
        const nextIndex = (currentIndex + 1) % songs.length;
        openPlayer(songs[nextIndex]);
    }

    function previousTrack() {
        if (player && player.getCurrentTime() > 3) {
            player.seekTo(0);
            return;
        }
        const currentIndex = songs.indexOf(currentVideoId);
        const prevIndex = (currentIndex - 1 + songs.length) % songs.length;
        openPlayer(songs[prevIndex]);
    }

    function seekTo(event) {
        if (!player || !player.getDuration) return;
        const rect = event.currentTarget.getBoundingClientRect();
        const pos = (event.clientX - rect.left) / rect.width;
        player.seekTo(pos * player.getDuration());
    }

    function startSeekTimer() {
        stopSeekTimer();
        seekInterval = setInterval(() => {
            if (!player || !player.getCurrentTime) return;
            const current = player.getCurrentTime();
            const duration = player.getDuration();
            document.getElementById('seek-fill').style.width = (current / duration * 100) + '%';
            document.getElementById('time-current').textContent = formatTime(current);
            document.getElementById('time-duration').textContent = formatTime(duration);
        }, 500);
    }

    function stopSeekTimer() { if (seekInterval) clearInterval(seekInterval); }
    function formatTime(s) { 
        if (!s) return '0:00';
        const m = Math.floor(s / 60); const sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' + sec : sec);
    }

    function connectEQ() {
        if (!audioContext) {
            try { audioContext = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
        }
        if (audioContext.state === 'suspended') audioContext.resume();
        setTimeout(() => {
            try {
                const iframe = document.querySelector('#yt-player');
                const video = iframe?.contentWindow?.document.querySelector('video');
                if (video && !audioSource) {
                    audioSource = audioContext.createMediaElementSource(video);

                    // 1. 11-band parametric EQ
                    eqFilters = eqBands.map(band => {
                        const f = audioContext.createBiquadFilter();
                        f.type = band.type;
                        f.frequency.value = band.freq;
                        f.Q.value = band.Q;
                        f.gain.value = band.gain;
                        return f;
                    });

                    // 2. Multiband compressor for dynamic punch
                    compressor = audioContext.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 8;
                    compressor.ratio.value = 3.5;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.18;

                    // 3. Stereo widener via mid-side splitter
                    const splitter = audioContext.createChannelSplitter(2);
                    const merger = audioContext.createChannelMerger(2);
                    const midGain = audioContext.createGain();
                    const sideGain = audioContext.createGain();
                    midGain.gain.value = 1.0;
                    sideGain.gain.value = 1.35; // widen stereo image

                    // 4. Harmonic exciter (subtle high-freq saturation)
                    const exciterGain = audioContext.createGain();
                    exciterGain.gain.value = 0.18;
                    const exciterHP = audioContext.createBiquadFilter();
                    exciterHP.type = 'highpass';
                    exciterHP.frequency.value = 3500;
                    const waveShaper = audioContext.createWaveShaper();
                    const curve = new Float32Array(256);
                    for (let i = 0; i < 256; i++) {
                        const x = (i * 2) / 256 - 1;
                        curve[i] = (Math.PI + 80) * x / (Math.PI + 80 * Math.abs(x));
                    }
                    waveShaper.curve = curve;
                    waveShaper.oversample = '4x';

                    // 5. Output limiter (prevent clipping)
                    limiterNode = audioContext.createDynamicsCompressor();
                    limiterNode.threshold.value = -1.5;
                    limiterNode.knee.value = 0;
                    limiterNode.ratio.value = 20;
                    limiterNode.attack.value = 0.001;
                    limiterNode.release.value = 0.05;

                    // 6. Output gain
                    gainNode = audioContext.createGain();
                    gainNode.gain.value = 1.15;

                    // Chain: source → EQ filters → compressor → splitter → stereo widen → merger → exciter mix → limiter → gain → output
                    audioSource.connect(eqFilters[0]);
                    for (let i = 0; i < eqFilters.length - 1; i++) eqFilters[i].connect(eqFilters[i + 1]);
                    eqFilters[eqFilters.length - 1].connect(compressor);

                    compressor.connect(splitter);
                    splitter.connect(midGain, 0);
                    splitter.connect(sideGain, 1);
                    midGain.connect(merger, 0, 0);
                    sideGain.connect(merger, 0, 1);

                    // Exciter parallel path
                    compressor.connect(exciterHP);
                    exciterHP.connect(waveShaper);
                    waveShaper.connect(exciterGain);
                    exciterGain.connect(merger);

                    merger.connect(limiterNode);
                    limiterNode.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                }
            } catch (e) {}
        }, 1000);
    }

    function openNotification() {
        document.getElementById('notif-overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        history.pushState({notif: true}, '', '#info');
    }

    function closeNotification() {
        document.getElementById('notif-overlay').style.display = 'none';
        document.body.style.overflow = '';
        if (window.location.hash === '#info') history.back();
    }

    // SWIPE NAVIGATION LOGIC
    let touchStartY = 0;
    const playerWindow = document.getElementById('player-window');
    playerWindow.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive: true});
    playerWindow.addEventListener('touchend', e => {
        const touchEndY = e.changedTouches[0].clientY;
        if (Math.abs(touchEndY - touchStartY) > 100) closePlayer();
    }, {passive: true});

    window.addEventListener('popstate', () => {
        if (document.getElementById('player-overlay').style.display === 'flex') {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('mini-player').style.display = 'flex';
            document.body.style.overflow = '';
        }
        if (document.getElementById('notif-overlay').style.display === 'flex') {
            document.getElementById('notif-overlay').style.display = 'none';
            document.body.style.overflow = '';
        }
    });

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            if (document.getElementById('player-overlay').style.display === 'flex') closePlayer();
            else if (document.getElementById('notif-overlay').style.display === 'flex') closeNotification();
        }
    });
</script>
</body>
</html>
